dataset_root: /vepfs/dataset/benchmark
model_root: /vepfs/model
output_dir: outputs/benchmark_eval/longcaption_repro_e20_b896_20260513
conda_env: openclip
device: cuda
dtype: bf16
batch_size: 96
num_workers: 8
distributed_eval: true
num_workers_per_gpu: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 4
pair_chunk_size: 8192
perf_log_interval: 20
write_perf_jsonl: true
random_seed: 42
dry_run_limit: 8
compute_random_negative: true
save_figures: true

eval_mode:
  spvd_pairwise_mode: exact_cached
  retrieval_mode: global
  rerank_topk: 100
  score_chunk: 8192
  pair_chunk_size: 8192

benchmarks:
  enabled:
    - aro
    - sugarcrepe
    - winoground
  aro:
    root: /vepfs/dataset/benchmark/aro
    order_splits:
      - test
      - val
    order_max_words: 30
  sugarcrepe:
    root: /vepfs/dataset/benchmark/sugarcrepe
  winoground:
    root: /vepfs/dataset/benchmark/winoground

models:
  - name: cc3m_recap_clip_e20_b896
    model_type: open_clip
    model_name: ViT-B-16
    checkpoint_path: /vepfs/outputs/longcaption_cc3m_repro/cc3m_recap_vitb16_clip_e20_gb1792_gpu01_b896_w32/epoch_20.pt
  - name: cc3m_recap_siglip_e20_b896
    model_type: open_clip
    model_name: ViT-B-16
    checkpoint_path: /vepfs/outputs/longcaption_cc3m_repro/cc3m_recap_vitb16_siglip_e20_gb1792_gpu23_b896_w32/epoch_20.pt
