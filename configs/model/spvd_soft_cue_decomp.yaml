model:
  name: SPVD-ViT-B-16
  model_config: src/model_configs/SPVD-ViT-B-16.json
  base_model_type: openclip_style
  pretrained: ""
  image_size: 224
  embed_dim: 512
  output_dict: true
  normalize: true
  use_logit_scale: true

  # Enable the soft-cue-conditioned bidirectional visual decomposition path.
  enable_soft_cue_decomp: true
  num_soft_cues: 4
  soft_cue_num_heads: 4
  soft_cue_num_layers: 1
  soft_cue_dropout: 0.0
  relevance_temperature: 1.0
  routing_temperature: 1.0

  # Keep visual/text tokens available for the conditional decomposition branch.
  return_patch_tokens: true
  use_global_image_head: true
  normalize_outputs: true

loss:
  name: spvd
  decomp_loss_weight: 0.1
  residual_loss_weight: 0.05
  orth_loss_weight: 0.01
  detach_relevance: true
  residual_variance_gamma: 1.0
