project_name: SPVD
use_spvd: true

experiment:
  name: r1_full_softcue_spvd_region_signed_3000
  output_dir: /vepfs/code/SPVD/outputs/round1_12h/r1_full_softcue_spvd_region_signed_3000
  seed: 42

data:
  dataset: CC3M-recap
  dataset_path: /vepfs/dataset/cc3m
  root: /vepfs/dataset/cc3m_longcaption
  type: webdataset
  train_data: /vepfs/dataset/cc3m_longcaption/cc3m-train-{0000..0575}.tar
  train_num_samples: 2823423
  val_data: null
  image_key: jpg
  caption_key: txt
  filter_relabel_success: true
  relabel_success_key: longSV
  strict_caption_match: true
  num_sampled_captions: 4
  max_merged_num: 3
  long_caption_file: null
  long_caption_index: null
  metadata_key: null
  batch_size: 512
  num_workers: 12
  prefetch_factor: 2
  sample_shuffle_size: 5000
  sample_shuffle_initial: 1000
  shard_shuffle_size: 2000
  shard_shuffle_initial: 500
  persistent_workers: true
  pin_memory: true
  tar_mode: r|*
  tokenize_in_collate: false
  shuffle: true

model:
  name: SPVD-ViT-B-16
  model_config: src/model_configs/SPVD-ViT-B-16.json
  base_model_type: openclip_style
  pretrained: ""
  image_size: 224
  embed_dim: 512
  output_dict: true
  normalize: true
  use_logit_scale: true
  init_logit_bias: -10
  enable_soft_cue_decomp: true
  use_finegrained_text_cue: true
  text_cue_type: soft_cue
  use_text_conditioned_routing: true
  use_private_branch: true
  num_soft_cues: 4
  soft_cue_num_heads: 4
  soft_cue_num_layers: 1
  soft_cue_dropout: 0.0
  gate_temperature: 1.0
  gate_bias_init: 0.0
  return_patch_tokens: true
  use_global_image_head: true
  normalize_outputs: true

loss:
  name: spvd
  align_loss: sigmoid
  align_weight: 1.0
  global_align_weight: 0.0
  caption_align_weight: 1.0
  caption_loss_impl: masked_sigmoid
  caption_mask_same_image: true
  caption_same_image_mode: region_soft_signed
  caption_region_pos_weight: 0.05
  caption_region_neg_weight: 0.01
  caption_region_start_weight: 0.0
  caption_region_warmup_steps: 2000
  caption_region_pos_min_overlap: 0.3
  caption_region_neg_max_overlap: 0.1
  caption_region_overlap_gamma: 1.0
  caption_region_detach_overlap: true
  dist_impl: bidir
  use_uniform_loss: false
  uniform_weight: 0.0
  branch_bce_weight: 0.05
  branch_logit_scale: 5.0
  residual_negative_weight: 0.25
  detach_text_for_residual: true
  residual_variance_weight: 0.02
  residual_variance_gamma: 1.0
  branch_bce_start_weight: 0.0
  residual_variance_start_weight: 0.0
  branch_bce_warmup_steps: 2000
  residual_variance_warmup_steps: 2000

regularization:
  use_uniformity: false
  uniformity_weight: 0.0
  use_variance: false
  variance_weight: 0.0
  use_covariance: false
  covariance_weight: 0.0
  use_effective_rank: false
  effective_rank_weight: 0.0

optim:
  optimizer: adamw
  lr: 2.0e-4
  weight_decay: 0.2
  betas: [0.9, 0.98]
  eps: 1.0e-6
  epochs: 32
  warmup_steps: 3000
  grad_accum_steps: 1
  amp: true
  clamp_logit_scale: true
  min_logit_scale: 1.0
  max_logit_scale: 100.0
  grad_clip_norm: null

distributed:
  backend: nccl
  find_unused_parameters: false

training:
  debug_finite_checks: true
  max_steps: 3000

logging:
  log_interval: 100
  save_interval: 1
  report_to: none

diagnostics:
  enabled: true
  log_interval: 100
  heavy_log_interval: 100000000
  per_layer: false
  log_update_rms: false
  log_effective_rank: false
  log_redundancy: false
