dataset_root: /vepfs/dataset
model_root: /vepfs/model
output_dir: outputs/zero_train_diagnostics
conda_env: openclip
device: cuda
dtype: fp32
batch_size: 64
num_workers: 8
random_seed: 42
dry_run_limit: 8
compute_random_negative: true
save_figures: true

benchmarks:
  enabled:
    - aro
    - sugarcrepe
    - winoground
  aro:
    root:
    order_splits:
      - test
      - val
    order_max_words: 30
  sugarcrepe:
    root:
  winoground:
    root:

models:
  - name: clip_vit_b32_openai
    model_type: open_clip
    model_name: ViT-B-32
    pretrained: openai
    checkpoint_file: ViT-B-32.pt
    force_quick_gelu: true

  - name: clip_vit_l14_openai
    model_type: open_clip
    model_name: ViT-L-14
    pretrained: openai
    checkpoint_file: ViT-L-14.pt
    force_quick_gelu: true

  - name: openclip_vit_b32_laion2b
    model_type: open_clip
    model_name: ViT-B-32
    pretrained: laion2b_s34b_b79k
    checkpoint_file: open_clip_model.safetensors

  - name: openclip_vit_h14_laion2b
    model_type: open_clip
    model_name: ViT-H-14
    pretrained: laion2b_s32b_b79k
    checkpoint_file: open_clip_model.safetensors

  - name: siglip_so400m_p14_384
    model_type: siglip
    hf_id: google/siglip-so400m-patch14-384

  - name: blip_itm_base_coco
    model_type: blip_itm
    hf_id: Salesforce/blip-itm-base-coco
